<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: url('index.jpg') no-repeat;
    background-size: contain;
    background-position: center top;
    background-color: black;
}

h1 {
    margin: 40px;
    color: white;
}

/* Diagramm */
#chart {
    width: 80%;
    margin: 40px auto;
}

/* Balken */
.bar-container {
    margin: 12px 0;
    cursor: pointer;
}

.bar {
    height: 55px;
    display: flex;
    align-items: center;
    padding-left: 15px;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    color: black;
}

/* ausgewähltes Team */
.selected {
    outline: 4px solid white;
}

/* Gewinner */
.winner {
    border: 3px solid gold;
}

/* unsichtbare Klickzonen */
.left, .right {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
}

.left { left: 0; }
.right { right: 0; }

</style>
</head>

<body>

<h1>🥃 Shot Counter</h1>

<!-- Maussteuerung optional -->
<div class="left" onclick="removePoint()"></div>
<div class="right" onclick="addPoint()"></div>

<div id="chart"></div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Spielplatzverein", score: 0, color: "#66cc66" }
];

let selectedTeam = 0;

// ➕ Punkt
function addPoint() {
    teams[selectedTeam].score++;
    drawChart();
}

// ➖ Punkt
function removePoint() {
    teams[selectedTeam].score = Math.max(0, teams[selectedTeam].score - 1);
    drawChart();
}

// Team auswählen
function selectTeam(index) {
    selectedTeam = index;
    drawChart();
}

// ✅ Tastatur-Steuerung
document.addEventListener("keydown", function(event) {
    if (event.code === "Space") {
        event.preventDefault(); // verhindert Scrollen
        addPoint();
    }
    if (event.code === "Backspace" || event.code === "Delete") {
        event.preventDefault();
        removePoint();
    }
});

// Diagramm
function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    let sorted = [...teams].sort((a, b) => b.score - a.score);
    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let width = (t.score / max) * 100;
        let originalIndex = teams.indexOf(t);

        chart.innerHTML += `
            <div class="bar-container" onclick="selectTeam(${originalIndex})">

                <div class="bar 
                    ${originalIndex === selectedTeam ? "selected" : ""} 
                    ${index === 0 ? "winner" : ""}"
                    style="width:${width}%; background:${t.color};">

                    ${t.name} — ${t.score}
                    ${index === 0 ? " 🏆" : ""}

                </div>

            </div>
        `;
    });
}

drawChart();
</script>

</body>
</html>
