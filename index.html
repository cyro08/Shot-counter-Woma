<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot-Counter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background-color: white;
}

/* Titel */
h1 {
    margin: 20px;
    font-size: 40px;
}

/* Wrapper für Hintergrund + Bars */
#container {
    position: relative;
    width: 80%;
    margin: auto;
    margin-top: 30px;
}

/* ✅ Logo im Hintergrund */
#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    opacity: 0.12; /* transparent */
    z-index: 0;
}

/* Diagramm */
#chart {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Balken */
.bar {
    height: 60px;
    display: flex;
    align-items: center;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;

    padding-left: 20px;
    color: black;

    cursor: pointer;
    transition: 0.2s;
}

/* ausgewählt */
.selected {
    outline: 4px solid black;
}

/* Gewinner */
.winner {
    border: 3px solid gold;
}

</style>
</head>

<body>

<h1>Shot‑Counter</h1>

<div id="container">

    <!-- ✅ Hintergrund Logo -->
    <img src="index.jpg" id="logo">

    <!-- Balken -->
    <div id="chart"></div>

</div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Team C", score: 0, color: "#66cc66" }
];

let selectedTeam = 0;

// ➕
function addPoint() {
    teams[selectedTeam].score++;
    drawChart();
}

// ➖
function removePoint() {
    teams[selectedTeam].score = Math.max(0, teams[selectedTeam].score - 1);
    drawChart();
}

// Team auswählen
function selectTeam(index) {
    selectedTeam = index;
    drawChart();
}

// ✅ Tastatur
document.addEventListener("keydown", function(event) {
    if (event.code === "Space") {
        event.preventDefault();
        addPoint();
    }
    if (event.code === "Backspace" || event.code === "Delete") {
        event.preventDefault();
        removePoint();
    }
});

// Zeichnen
function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    let sorted = [...teams].sort((a, b) => b.score - a.score);
    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let width = (t.score / max) * 100;
        let originalIndex = teams.indexOf(t);

        chart.innerHTML += `
            <div 
                class="bar 
                ${originalIndex === selectedTeam ? "selected" : ""} 
                ${index === 0 ? "winner" : ""}" 
                
                onclick="selectTeam(${originalIndex})"
                
                style="width:${width}%; background:${t.color};">

                ${t.name} — ${t.score}
                ${index === 0 ? " 🏆" : ""}

            </div>
        `;
    });
}

drawChart();
</script>

</body>
</html>
