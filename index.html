<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url('index.jpg') no-repeat center center fixed;
    background-size: cover;
}

h1 {
    margin: 20px;
}

/* Team-Auswahl */
#teamSelect {
    font-size: 20px;
    padding: 10px;
    margin-bottom: 20px;
}

/* Buttons */
button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

/* Diagramm */
#chart {
    width: 80%;
    margin: auto;
    margin-top: 30px;
}

/* Balken */
.bar-container {
    margin: 10px 0;
}

.bar {
    height: 50px;
    line-height: 50px;
    text-align: left;
    padding-left: 15px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
}

/* Gewinner */
.winner {
    border: 3px solid gold;
}
</style>
</head>

<body>

<h1>🥃 Shot Counter</h1>

<!-- Team auswählen -->
<select id="teamSelect"></select>

<br>

<!-- Steuerung -->
<button onclick="addPoint()">+1</button>
<button onclick="removePoint()">-1</button>

<!-- Diagramm -->
<div id="chart"></div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Spielplatzverein", score: 0, color: "#66cc66" }
];

// Dropdown füllen
function init() {
    let select = document.getElementById("teamSelect");

    teams.forEach((t, i) => {
        select.innerHTML += `<option value="${i}">${t.name}</option>`;
    });

    drawChart();
}

// + Punkt
function addPoint() {
    let i = document.getElementById("teamSelect").value;
    teams[i].score++;
    drawChart();
}

// - Punkt
function removePoint() {
    let i = document.getElementById("teamSelect").value;
    teams[i].score = Math.max(0, teams[i].score - 1);
    drawChart();
}

// Diagramm
function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    // Sortieren (Gewinner oben)
    let sorted = [...teams].sort((a, b) => b.score - a.score);

    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let width = (t.score / max) * 100;

        chart.innerHTML += `
            <div class="bar-container">
                <div class="bar ${index === 0 ? "winner" : ""}"
                     style="width:${width}%; background:${t.color};">
                    ${t.name} – ${t.score}
                    ${index === 0 ? " 🏆" : ""}
                </div>
            </div>
        `;
    });
}

init();
</script>

</body>
</html>
