<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: white; /* ✅ jetzt weiss */
    text-align: center;
}

/* Logo */
#logo {
    width: 100%;
    max-height: 50vh;
    object-fit: contain;
    margin-top: 20px;
}

/* Diagramm */
#chart {
    width: 60%;
    margin: 40px auto;
}

/* Balken */
.bar-container {
    margin: 12px 0;
    cursor: pointer;
}

.bar {
    height: 55px;
    display: flex;
    align-items: center;
    padding-left: 20px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    color: black;
}

.selected {
    outline: 4px solid black; /* ✅ besser sichtbar auf weiss */
}

.winner {
    border: 3px solid gold;
}
</style>
</head>

<body>

<img src="index.jpg" id="logo">

<div id="chart"></div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Spielplatzverein", score: 0, color: "#66cc66" }
];

let selectedTeam = 0;

function addPoint() {
    teams[selectedTeam].score++;
    drawChart();
}

function removePoint() {
    teams[selectedTeam].score = Math.max(0, teams[selectedTeam].score - 1);
    drawChart();
}

function selectTeam(index) {
    selectedTeam = index;
    drawChart();
}

/* ✅ Tastatursteuerung */
document.addEventListener("keydown", function(event) {
    if (event.code === "Space") {
        event.preventDefault();
        addPoint();
    }
    if (event.code === "Backspace" || event.code === "Delete") {
        event.preventDefault();
        removePoint();
    }
});

/* Diagramm */
function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    let sorted = [...teams].sort((a, b) => b.score - a.score);
    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let width = (t.score / max) * 100;
        let originalIndex = teams.indexOf(t);

        chart.innerHTML += `
            <div class="bar-container" onclick="selectTeam(${originalIndex})">
                <div class="bar 
                    ${originalIndex === selectedTeam ? "selected" : ""} 
                    ${index === 0 ? "winner" : ""}"
                    style="width:${width}%; background:${t.color};">
                    
                    ${t.name} — ${t.score}
                    ${index === 0 ? " 🏆" : ""}
                </div>
            </div>
        `;
    });
}

drawChart();
</script>

</body>
</html>
