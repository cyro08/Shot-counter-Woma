<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    color: white;
    text-align: center;
    font-family: Arial;
    background: url('index.jpg') no-repeat center center fixed;
    background-size: cover;
}

#team {
    font-size: 40px;
    margin-top: 40px;
}

#score {
    font-size: 80px;
    margin: 20px;
}

#chart {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 300px;
    gap: 20px;
}

.bar {
    width: 60px;
    background: rgba(0,150,255,0.8);
}

.left, .right {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
}

.left { left: 0; }
.right { right: 0; }
</style>
</head>

<body>

<h1>🥃 Shot Counter</h1>

<div id="team"></div>
<div id="score"></div>

<div class="left" onclick="minus()"></div>
<div class="right" onclick="plus()"></div>

<div id="chart"></div>

<script>
let teams = [
    { name: "Team A", score: 0 },
    { name: "Team B", score: 0 }
];

let current = 0;

function update() {
    document.getElementById("team").innerText = teams[current].name;
    document.getElementById("score").innerText = teams[current].score;
    drawChart();
}

function plus() {
    teams[current].score++;
    next();
}

function minus() {
    teams[current].score = Math.max(0, teams[current].score - 1);
    next();
}

function next() {
    current = (current + 1) % teams.length;
    update();
}

function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    let max = Math.max(...teams.map(t => t.score), 1);

    teams.forEach(t => {
        let h = (t.score / max) * 100;

        chart.innerHTML += `
            <div>
                <div class="bar" style="height:${h}%"></div>
                <div>${t.name} (${t.score})</div>
            </div>
        `;
    });
}

update();
</script>

</body>
</html>
