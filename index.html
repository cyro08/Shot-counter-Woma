<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url('index.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Logo */
h1 {
    margin-top: 40px;
    text-align: center;
}

/* Buttons */
button {
    font-size: 22px;
    padding: 10px 25px;
    margin: 10px;
    cursor: pointer;
}

/* Diagramm */
#chart {
    width: 80%;
    margin: 40px auto;
}

/* Balken */
.bar-container {
    margin: 12px 0;
    cursor: pointer;
}

.bar {
    height: 55px;
    display: flex;
    align-items: center;
    padding-left: 15px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    transition: 0.2s;
}

/* ausgewähltes Team */
.selected {
    outline: 4px solid white;
}

/* Gewinner */
.winner {
    border: 3px solid gold;
}
</style>
</head>

<body>

<h1>🥃 Shot Counter</h1>

<!-- Steuerung -->
<button onclick="addPoint()">+1</button>
<button onclick="removePoint()">-1</button>

<!-- Diagramm -->
<div id="chart"></div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Spielplatzverein", score: 0, color: "#66cc66" }
];

let selectedTeam = 0;

// + Punkt
function addPoint() {
    teams[selectedTeam].score++;
    drawChart();
}

// - Punkt
function removePoint() {
    teams[selectedTeam].score = Math.max(0, teams[selectedTeam].score - 1);
    drawChart();
}

// Team auswählen
function selectTeam(index) {
    selectedTeam = index;
    drawChart();
}

// Diagramm
function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    // Sortieren (Gewinner oben)
    let sorted = [...teams].sort((a, b) => b.score - a.score);

    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let width = (t.score / max) * 100;

        // Original Index wiederfinden
        let originalIndex = teams.indexOf(t);

        chart.innerHTML += `
            <div class="bar-container" onclick="selectTeam(${originalIndex})">
                <div class="bar 
                    ${originalIndex === selectedTeam ? "selected" : ""} 
                    ${index === 0 ? "winner" : ""}"
                    style="width:${width}%; background:${t.color};">
                    
                    ${t.name} — ${t.score}
                    ${index === 0 ? " 🏆" : ""}
                </div>
            </div>
        `;
    });
}

drawChart();
</script>

</body>
</html>
