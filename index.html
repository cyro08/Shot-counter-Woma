<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shot Counter</title>

<style>
body {
    margin: 0;
    color: white;
    text-align: center;
    font-family: Arial;
    background: url('index.jpg') no-repeat center center fixed;
    background-size: cover;
}

h1 {
    margin-top: 20px;
}

#team {
    font-size: 40px;
    margin-top: 40px;
}

#score {
    font-size: 80px;
    margin: 20px;
}

#chart {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 320px;
    gap: 25px;
    margin-top: 30px;
}

.bar-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bar {
    width: 70px;
    border-radius: 10px 10px 0 0;
}

.winner {
    border: 4px solid gold;
}

.left, .right {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
}

.left { left: 0; }
.right { right: 0; }
</style>
</head>

<body>

<h1>🥃 Shot Counter</h1>

<div id="team"></div>
<div id="score"></div>

<div class="left" onclick="minus()"></div>
<div class="right" onclick="plus()"></div>

<div id="chart"></div>

<script>
let teams = [
    { name: "Ehemalige", score: 0, color: "#ff4d4d" },
    { name: "Leiter", score: 0, color: "#4da6ff" },
    { name: "Spielplatzverein", score: 0, color: "#66cc66" }
];

let current = 0;

function update() {
    document.getElementById("team").innerText = teams[current].name;
    document.getElementById("score").innerText = teams[current].score;
    drawChart();
}

function plus() {
    teams[current].score++;
    next();
}

function minus() {
    teams[current].score = Math.max(0, teams[current].score - 1);
    next();
}

function next() {
    current = (current + 1) % teams.length;
    update();
}

function drawChart() {
    let chart = document.getElementById("chart");
    chart.innerHTML = "";

    let sorted = [...teams].sort((a, b) => b.score - a.score);
    let max = Math.max(...teams.map(t => t.score), 1);

    sorted.forEach((t, index) => {
        let height = (t.score / max) * 250;

        chart.innerHTML += `
            <div class="bar-container">
                <div class="bar ${index === 0 ? "winner" : ""}" 
                     style="height:${height}px; background:${t.color};">
                </div>
                <div>${t.name}</div>
                <div>${t.score}</div>
                ${index === 0 ? "<div>🏆</div>" : ""}
            </div>
        `;
    });
}

update();
</script>

</body>
</html>
